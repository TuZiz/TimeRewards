    - " `100分钟在线奖励` `200分钟在线奖励` "

  GuiKey:
    "S":
      Material: "PLAYER_HEAD"
      Name: "&#FFD700&l✦ &f我的在线统计 &l✦"
      Lore:
        - ""
        - " &8 ├─ &7今日 &8» &f&l{today_time}"
        - " &8 ├─ &7本周 &8» &f&l{week_time}"
        - " &8 ├─ &7本月 &8» &f&l{month_time}"
        - " &8 ├─ &7本年 &8» &f&l{year_time}"
        - " &8 └─ &7累计 &8» &f&l{total_time}"
        - ""
      IconFunction: "stats"

    "A":
      Material: "LIME_DYE"
      Name: "&#10AC84&l自动领取 &8» &f{auto_claim_status}"
      Lore:
        - ""
        - " &8▪ &7状态 &8» {auto_claim_status_color}{auto_claim_status}"
        - " &8▪ &7开启后达到时间会自动领取可用奖励"
        - " &e{auto_claim_toggle}"
        - ""
      IconFunction: "auto_claim"

    "R":
      Material: "GOLD_BLOCK"
      Name: "{reward_display}"
      Lore:
        - ""
        - " &8▪ &7请在 Rewards 配置里自定义该奖励的 lore"
        - " &e点击尝试领取"
        - ""
      IconFunction: "reward"

    "P":
      Material: "ARROW"
      Name: "&#54A0FF&l⟲ &f上一页"
      Lore:
        - "&8 » &7显式奖励布局不需要翻页"
      IconFunction: "previous"

    "G":
      Material: "PAPER"
      Name: "&#00D2D3&l第 &f{page} &8/ &f{pages} &#00D2D3&l页"
      Lore:
        - "&8 » &7当前 GUI 配置了 &f{reward_count} &7个奖励"
      IconFunction: "page"

    "N":
      Material: "ARROW"
      Name: "&#10AC84&l➤ &f下一页"
      Lore:
        - "&8 » &7显式奖励布局不需要翻页"
      IconFunction: "next"

