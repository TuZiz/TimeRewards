enabled: true

gui:
  Title: "&#FFD700&l❖ &8| &f每日在线奖励 &8» &7在线越久，奖励越丰厚"

  GuiPlain:
    - "   S A G "
    - " `20分钟在线奖励` `120分钟在线奖励` "
    - " `40分钟在线奖励` `140分钟在线奖励` "
    - " `60分钟在线奖励` `160分钟在线奖励` "
