# ==========================================
# 在线奖励配置
# 今日奖励使用 GUI 展示
# 其他周期奖励使用命令查看:
# /tr week
# /tr month
# /tr year
# /tr total
# /tr claim <scope> <奖励ID或序号>
# ==========================================

settings:
  default-scope: today

database:
  enabled: false
  type: mysql
  migrate-existing-yaml: true
  mysql:
    host: localhost
    port: 3306
    database: timerewards
    username: root
    password: ""
    table-prefix: timerewards_
    parameters: "useSSL=false&characterEncoding=utf8&serverTimezone=UTC"

# 奖励内容已拆分到 Rewards 文件夹:
# - Rewards/day.yml
# - Rewards/week.yml
# - Rewards/month.yml
# - Rewards/year.yml
# - Rewards/total.yml
