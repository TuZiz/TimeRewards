# ==========================================
# 在线奖励配置
# 今日奖励使用 GUI 展示
# 其他周期奖励使用命令查看:
# /tr week
# /tr month
# /tr year
# /tr total
# /tr claim <scope> <奖励ID或序号>
# ==========================================

settings:
  default-scope: today

database:
  enabled: false
  type: mysql
  migrate-existing-yaml: true
  mysql:
    host: localhost
    port: 3306
    database: timerewards
    username: root
    password: ""
    table-prefix: timerewards_
    parameters: "useSSL=false&characterEncoding=utf8&serverTimezone=UTC"

gui:
  Title: "&#FFD700&l❖ &8| &f每日在线奖励 &8» &7在线越久，奖励越丰厚"

  GuiPlain:
    - "    S    "
    - " `30分钟在线奖励` R R R "
    - " R R R R "
    - " R R R R "
    - " R R R R "
    - "P   G   N"

  GuiKey:
    "S":
      Material: "PLAYER_HEAD"
      Name: "&#FFD700&l✦ &f我的在线统计 &l✦"
      Lore:
        - ""
        - " &8 ├─ &7今日 &8» &f&l{today_time}"
        - " &8 ├─ &7本周 &8» &f&l{week_time}"
        - " &8 ├─ &7本月 &8» &f&l{month_time}"
        - " &8 ├─ &7本年 &8» &f&l{year_time}"
        - " &8 └─ &7累计 &8» &f&l{total_time}"
        - ""
      IconFunction: "stats"

    "R":
      Material: "GOLD_BLOCK"
      Name: "{reward_display}"
      Lore:
        - ""
        - " &8 ├─ &7需求时间 &8» &f{required_minutes} &7分钟"
        - " &8 ├─ &7当前进度 &8» &f{progress_text}"
        - " &8 ├─ &7当前状态 &8» {status}"
        - " &8 ├─ &b🎁 包含奖励 &8»"
        - "{reward_lines}"
        - " &8 └─ &e{hint}"
        - ""
      IconFunction: "reward"

    "P":
      Material: "ARROW"
      Name: "&#54A0FF&l⟲ &f上一页"
      Lore:
        - "&8 » &7点击查看上一页奖励"
      IconFunction: "previous"

    "G":
      Material: "PAPER"
      Name: "&#00D2D3&l第 &f{page} &8/ &f{pages} &#00D2D3&l页"
      Lore:
        - "&8 » &7当前共有 &f{reward_count} &7个今日奖励"
      IconFunction: "page"

    "N":
      Material: "ARROW"
      Name: "&#10AC84&l➤ &f下一页"
      Lore:
        - "&8 » &7点击查看下一页奖励"
      IconFunction: "next"

# 奖励内容已拆分到 Rewards 文件夹:
# - Rewards/day.yml
# - Rewards/week.yml
# - Rewards/month.yml
# - Rewards/year.yml
# - Rewards/total.yml
