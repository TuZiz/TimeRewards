# ==========================================
# 在线奖励配置
# 每个周期的 GUI 和奖励内容位于对应 Rewards 文件:
# Rewards/day.yml
# Rewards/week.yml
# Rewards/month.yml
# Rewards/year.yml
# Rewards/total.yml
# 可用命令:
# /tr today
# /tr week
# /tr month
# /tr year
# /tr total
# /tr claim <scope> <奖励ID或序号>
# ==========================================

settings:
  default-scope: today

database:
  enabled: false
  type: mysql
  migrate-existing-yaml: true
  mysql:
    host: localhost
    port: 3306
    database: timerewards
    username: root
    password: ""
    table-prefix: timerewards_
    parameters: "useSSL=false&characterEncoding=utf8&serverTimezone=UTC"

# 每个周期一个配置文件，文件内包含 gui 和 rewards 两段:
# - Rewards/day.yml
# - Rewards/week.yml
# - Rewards/month.yml
# - Rewards/year.yml
# - Rewards/total.yml
